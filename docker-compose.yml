services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pymeet}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pymeet_password}
      POSTGRES_DB: ${POSTGRES_DB:-pymeet}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pymeet}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: always
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://pymeet:pymeet_password@postgres:5432/pymeet}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-replace-with-a-long-random-secret}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:5173}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      ENVIRONMENT: development
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./frontend
    restart: always
    environment:
      VITE_API_URL: ""
      VITE_SOCKET_URL: ""
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

  tunnel:
    image: ngrok/ngrok:latest
    environment:
      NGROK_AUTHTOKEN: 3FSKXVJ81s2bfSAYJraBp3zmmgc_57W2xgaY1k4zQzQaqAGuB
    command: http frontend:5173 --domain=stylized-refined-grafting.ngrok-free.dev
    restart: always
    depends_on:
      - frontend

volumes:
  postgres_data:
