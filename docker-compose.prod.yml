services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ardvmeetinghub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ardvmeetinghub_password}
      POSTGRES_DB: ${POSTGRES_DB:-ardvmeetinghub}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ardvmeetinghub}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app_network

  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://ardvmeetinghub:ardvmeetinghub_password@postgres:5432/ardvmeetinghub}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-replace-with-a-long-random-secret}
      # The frontend origin will be the domain or IP where the site is hosted.
      # For Nginx serving on the same domain, relative requests will just be same-origin.
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-*}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      ENVIRONMENT: production
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app_network

  frontend:
    build: 
      context: ./frontend
      dockerfile: Dockerfile.prod
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
    networks:
      - app_network

volumes:
  postgres_data:

networks:
  app_network:
    driver: bridge
