services:
  - type: web
    name: ardvmeetinghub-backend
    env: docker
    plan: free
    rootDir: backend
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ardvmeetinghub-db
          property: connectionString
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: FRONTEND_ORIGIN
        value: "*"

databases:
  - name: ardvmeetinghub-db
    databaseName: ardvmeetinghub
    user: ardvmeetinghub
    plan: free
